name: Auto Liqi

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update_available]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-liqi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v3
        uses: actions/checkout@v4
        with:
          ref: v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: python -m pip install --upgrade requests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install protobufjs-cli
        run: npm install -g protobufjs protobufjs-cli

      - name: Fetch latest liqi.json
        id: fetch
        run: python scripts/fetch_liqi.py

      - name: Regenerate liqi.proto
        if: steps.fetch.outputs.changed == 'true'
        run: |
          pbjs -t proto3 src/bridge/majsoul/liqi.json \
            > src/bridge/majsoul/proto/liqi.proto

      - name: Open PR
        if: steps.fetch.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: v3
          branch: auto/liqi-${{ steps.fetch.outputs.version }}
          delete-branch: true
          commit-message: |
            chore(majsoul): update liqi.proto/liqi.json to ${{ steps.fetch.outputs.version }}

            prefix: ${{ steps.fetch.outputs.liqi_prefix }}
          title: "chore(majsoul): update liqi to ${{ steps.fetch.outputs.version }}"
          body: |
            Automated update of Mahjong Soul protocol definitions.

            - Game version: `${{ steps.fetch.outputs.version }}`
            - Resource prefix: `${{ steps.fetch.outputs.liqi_prefix }}`
            - Source: `https://game.maj-soul.com/1/${{ steps.fetch.outputs.liqi_prefix }}/res/proto/liqi.json`

            `liqi.proto` regenerated from `liqi.json` via `pbjs -t proto3`.

            Review the diff before merging — the proto fuels `build.rs`
            (prost-build) and the runtime descriptor pool used by
            `src/bridge/majsoul/parser.rs`.
          labels: |
            automation
            majsoul
          add-paths: |
            src/bridge/majsoul/liqi.json
            src/bridge/majsoul/proto/liqi.proto

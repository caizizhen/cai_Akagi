name: CI

on:
  push:
    branches: [v3]
  pull_request:
    branches: [v3]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust tests (example bot)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"

      - name: Linux system deps (Tauri link + tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            patchelf

      - name: Sync example bot venv
        run: cd mjai_bot/example && uv sync

      - name: cargo test --test example_bot
        run: cargo test --test example_bot

      - name: cargo test (full suite)
        run: cargo test
